<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Slider UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container">
        <!-- Slider Wrapper -->
        <div class="slider-wrapper">
            <!-- Slide 1 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Mountain Landscape">
            </div>
            <!-- Slide 2 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Nature Fog">
            </div>
            <!-- Slide 3 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Forest Path">
            </div>
            <!-- Slide 4 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1433477077279-9354d2d72f6b?q=80&w=1188&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Mountain Landscape">
            </div>
        </div>

        <!-- Navigation Arrows -->
        <button class="slider-arrow prev" aria-label="Previous Slide"></button>
        <button class="slider-arrow next" aria-label="Next Slide"></button>

        <!-- Dot Indicators -->
        <div class="slider-nav">
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            
        </div>
    </div>
    <script src="script.js"></script>

</body>
</html>
